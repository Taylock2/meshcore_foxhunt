<body class="bg-gray-900 text-gray-100 p-6">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">Topology Monitor</h1>
        
        <div class="flex gap-4 mb-6 bg-gray-800 p-4 rounded-lg">
            <button id="toggleBtn" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-500 font-bold transition-colors">
                Connect BLE
            </button>
            <input id="maxHops" type="number" value="4" class="bg-gray-700 w-16 px-2 py-1 rounded text-center">
            <input id="hashFilter" type="text" placeholder="0xF1" class="bg-gray-700 w-24 px-2 py-1 rounded">
        </div>

        <div id="map" class="h-96 mb-6 rounded-lg border border-gray-700 shadow-lg leaflet-container leaflet-touch leaflet-retina leaflet-fade-anim leaflet-grab leaflet-touch-drag leaflet-touch-zoom" tabindex="0" style="position: relative;"><div class="leaflet-pane leaflet-map-pane" style="transform: translate3d(-118px, 0px, 0px);"><div class="leaflet-pane leaflet-tile-pane"><div class="leaflet-layer " style="z-index: 1; opacity: 1;"><div class="leaflet-tile-container leaflet-zoom-animated" style="z-index: 18; transform: translate3d(0px, 0px, 0px) scale(1);"><img alt="" src="https://c.tile.openstreetmap.org/15/29578/20092.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(178px, -99px, 0px); opacity: 1;"><img alt="" src="https://a.tile.openstreetmap.org/15/29579/20092.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(434px, -99px, 0px); opacity: 1;"><img alt="" src="https://a.tile.openstreetmap.org/15/29578/20093.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(178px, 157px, 0px); opacity: 1;"><img alt="" src="https://b.tile.openstreetmap.org/15/29579/20093.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(434px, 157px, 0px); opacity: 1;"><img alt="" src="https://b.tile.openstreetmap.org/15/29577/20092.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(-78px, -99px, 0px); opacity: 1;"><img alt="" src="https://b.tile.openstreetmap.org/15/29580/20092.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(690px, -99px, 0px); opacity: 1;"><img alt="" src="https://c.tile.openstreetmap.org/15/29577/20093.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(-78px, 157px, 0px); opacity: 1;"><img alt="" src="https://c.tile.openstreetmap.org/15/29580/20093.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(690px, 157px, 0px); opacity: 1;"></div></div></div><div class="leaflet-pane leaflet-overlay-pane"><canvas class="leaflet-heatmap-layer leaflet-layer leaflet-zoom-animated" width="659" height="383" style="transform-origin: 50% 50%; transform: translate3d(118px, 0px, 0px);"></canvas></div><div class="leaflet-pane leaflet-shadow-pane"></div><div class="leaflet-pane leaflet-marker-pane"></div><div class="leaflet-pane leaflet-tooltip-pane"></div><div class="leaflet-pane leaflet-popup-pane"></div><div class="leaflet-proxy leaflet-zoom-animated" style="transform: translate3d(7.57224e+06px, 5.14384e+06px, 0px) scale(16384);"></div></div><div class="leaflet-control-container"><div class="leaflet-top leaflet-left"><div class="leaflet-control-zoom leaflet-bar leaflet-control"><a class="leaflet-control-zoom-in" href="#" title="Zoom in" role="button" aria-label="Zoom in" aria-disabled="false"><span aria-hidden="true">+</span></a><a class="leaflet-control-zoom-out" href="#" title="Zoom out" role="button" aria-label="Zoom out" aria-disabled="false"><span aria-hidden="true">−</span></a></div></div><div class="leaflet-top leaflet-right"></div><div class="leaflet-bottom leaflet-left"></div><div class="leaflet-bottom leaflet-right"><div class="leaflet-control-attribution leaflet-control"><a href="https://leafletjs.com" title="A JavaScript library for interactive maps"><svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8" class="leaflet-attribution-flag"><path fill="#4C7BE1" d="M0 0h12v4H0z"></path><path fill="#FFD500" d="M0 4h12v3H0z"></path><path fill="#E0BC00" d="M0 7h12v1H0z"></path></svg> Leaflet</a></div></div></div></div>

        <div id="log" class="font-mono text-xs bg-black p-4 rounded h-48 overflow-y-auto border border-gray-700">
            <div class="text-gray-500 italic">Ready.</div>
        </div>
    </div>

    <script type="module">
        import { WebBleConnection, Constants } from 'https://cdn.jsdelivr.net/npm/@liamcottle/meshcore.js/+esm';

        const logDiv = document.getElementById('log');
        const map = L.map('map').setView([-37.6937, 144.9652], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const heatPoints = [];
        const heatmap = L.heatLayer(heatPoints, { radius: 25, blur: 15 }).addTo(map);
        
        // Data storage for export and triangulation
        let packetCollection = []; 
        let connection = null;
        let currentPos = null;

        function appendLog(msg, color = 'text-gray-100') {
            const entry = document.createElement('div');
            const logDiv = document.getElementById('log');
            entry.className = color;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.prepend(entry);
        }

        navigator.geolocation.watchPosition(pos => {
            currentPos = [pos.coords.latitude, pos.coords.longitude];
        }, null, { enableHighAccuracy: true });

        // Function: Save data to file
        function downloadData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(packetCollection));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `mesh_data_${new Date().getTime()}.json`);
            dlAnchorElem.click();
        }

        // Function: Simple Weighted Centroid Triangulation
        function calculateCentroid() {
            let totalWeight = 0, latSum = 0, lonSum = 0;
            packetCollection.forEach(p => {
                // RSSI is negative, so we invert/normalize to get weight
                let weight = Math.pow(10, (p.rssi + 100) / 10); 
                latSum += p.lat * weight;
                lonSum += p.lon * weight;
                totalWeight += weight;
            });
            return [latSum / totalWeight, lonSum / totalWeight];
        }

        document.getElementById('toggleBtn').addEventListener('click', async () => {
            if (connection) {
                downloadData();
                const centroid = calculateCentroid();
                L.marker(centroid, { title: "Likely Source" }).addTo(map).bindPopup("Estimated Source Location").openPopup();
                appendLog("Data saved & Source estimated!");
                return;
            }

            try {
                connection = await WebBleConnection.open();
                document.getElementById('toggleBtn').textContent = "Save & Disconnect";
                
                connection.on(Constants.PushCodes.LogRxData, (event) => {
                    const data = event.raw;
                    if (!data || data.length < 9) return;

                    const hops = data[(data[0] & 0x03) === 0 ? 5 : 1] & 0x3F;
                    const hashIdx = ((data[0] & 0x03) === 0 ? 5 : 1) + 1 + (hops * ((data[(data[0] & 0x03) === 0 ? 5 : 1] >> 6) + 1));
                    const hash = "0X" + data[hashIdx].toString(16).toUpperCase();
                    
                    if (hops <= parseInt(document.getElementById('maxHops').value) && 
                       (!document.getElementById('hashFilter').value || hash === document.getElementById('hashFilter').value.toUpperCase())) {
                        
                        if (currentPos) {
                            packetCollection.push({ lat: currentPos[0], lon: currentPos[1], rssi: event.lastRssi, hash });
                            
                            L.circleMarker(currentPos, { color: 'cyan', radius: 4 }).addTo(map);
                            const intensity = Math.max(0, (event.lastRssi + 100) / 70);
                            heatPoints.push([...currentPos, intensity]);
                            heatmap.setLatLngs(heatPoints);
                            
                            appendLog(`Mapped: ${hash} @ ${event.lastRssi}dBm`);
                        }
                    }
                });
            } catch (err) { appendLog("Error: " + err.message); }
        });
    </script>

</body></html>
