<body class="bg-gray-900 text-gray-100 p-4 md:p-6">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">Topology Monitor</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <!-- Controls card -->
            <div class="flex flex-wrap items-center gap-3 bg-gray-800 p-4 rounded-lg border border-gray-700 md:col-span-2 shadow-lg">
                <button id="toggleBtn" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-500 font-bold transition-colors text-sm">
                    Connect BLE
                </button>
                <button id="pauseBtn" disabled class="bg-gray-700 text-gray-500 px-4 py-2 rounded font-bold transition-colors cursor-not-allowed text-sm">
                    Pause Logging
                </button>
                <div class="flex items-center gap-2">
                    <label for="hashFilter" class="text-xs font-semibold text-gray-400">Filter Hash:</label>
                    <input id="hashFilter" type="text" placeholder="0xF1" class="bg-gray-700 w-24 px-2 py-1 rounded text-gray-100 border border-gray-600 focus:outline-none focus:border-blue-500 text-sm">
                </div>
            </div>

            <!-- Status Card -->
            <div class="grid grid-cols-2 gap-2 bg-gray-800 p-4 rounded-lg border border-gray-700 shadow-lg">
                <!-- GPS Lock Status -->
                <div class="flex flex-col justify-center items-center p-2 rounded bg-gray-900 border border-gray-800">
                    <span class="text-[10px] uppercase font-bold tracking-wider text-gray-500">GPS Status</span>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="gpsDot" class="w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse"></span>
                        <span id="gpsText" class="font-bold text-sm text-yellow-500">Searching...</span>
                    </div>
                    <span id="gpsDetails" class="text-[10px] text-gray-400 mt-1 text-center font-mono">Waiting for fix</span>
                </div>

                <!-- Radio Connection Status -->
                <div class="flex flex-col justify-center items-center p-2 rounded bg-gray-900 border border-gray-800">
                    <span class="text-[10px] uppercase font-bold tracking-wider text-gray-500">Radio Link</span>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="radioDot" class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
                        <span id="radioText" class="font-bold text-sm text-red-500">Disconnected</span>
                    </div>
                    <span id="radioDetails" class="text-[10px] text-gray-400 mt-1 text-center font-mono">BLE Offline</span>
                </div>
            </div>
        </div>

        <div id="map" class="h-[50vh] md:h-[60vh] min-h-[350px] max-h-[600px] mb-6 rounded-lg border border-gray-700 shadow-lg leaflet-container leaflet-touch leaflet-retina leaflet-fade-anim leaflet-grab leaflet-touch-drag leaflet-touch-zoom" tabindex="0" style="position: relative;"><div class="leaflet-pane leaflet-map-pane" style="transform: translate3d(-118px, 0px, 0px);"><div class="leaflet-pane leaflet-tile-pane"><div class="leaflet-layer " style="z-index: 1; opacity: 1;"><div class="leaflet-tile-container leaflet-zoom-animated" style="z-index: 18; transform: translate3d(0px, 0px, 0px) scale(1);"><img alt="" src="https://c.tile.openstreetmap.org/15/29578/20092.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(178px, -99px, 0px); opacity: 1;"><img alt="" src="https://a.tile.openstreetmap.org/15/29579/20092.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(434px, -99px, 0px); opacity: 1;"><img alt="" src="https://a.tile.openstreetmap.org/15/29578/20093.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(178px, 157px, 0px); opacity: 1;"><img alt="" src="https://b.tile.openstreetmap.org/15/29579/20093.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(434px, 157px, 0px); opacity: 1;"><img alt="" src="https://b.tile.openstreetmap.org/15/29577/20092.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(-78px, -99px, 0px); opacity: 1;"><img alt="" src="https://b.tile.openstreetmap.org/15/29580/20092.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(690px, -99px, 0px); opacity: 1;"><img alt="" src="https://c.tile.openstreetmap.org/15/29577/20093.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(-78px, 157px, 0px); opacity: 1;"><img alt="" src="https://c.tile.openstreetmap.org/15/29580/20093.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(690px, 157px, 0px); opacity: 1;"></div></div></div><div class="leaflet-pane leaflet-overlay-pane"><canvas class="leaflet-heatmap-layer leaflet-layer leaflet-zoom-animated" width="659" height="383" style="transform-origin: 50% 50%; transform: translate3d(118px, 0px, 0px);"></canvas></div><div class="leaflet-pane leaflet-shadow-pane"></div><div class="leaflet-pane leaflet-marker-pane"></div><div class="leaflet-pane leaflet-tooltip-pane"></div><div class="leaflet-pane leaflet-popup-pane"></div><div class="leaflet-proxy leaflet-zoom-animated" style="transform: translate3d(7.57224e+06px, 5.14384e+06px, 0px) scale(16384);"></div></div><div class="leaflet-control-container"><div class="leaflet-top leaflet-left"><div class="leaflet-control-zoom leaflet-bar leaflet-control"><a class="leaflet-control-zoom-in" href="#" title="Zoom in" role="button" aria-label="Zoom in" aria-disabled="false"><span aria-hidden="true">+</span></a><a class="leaflet-control-zoom-out" href="#" title="Zoom out" role="button" aria-label="Zoom out" aria-disabled="false"><span aria-hidden="true">−</span></a></div></div><div class="leaflet-top leaflet-right"></div><div class="leaflet-bottom leaflet-left"></div><div class="leaflet-bottom leaflet-right"><div class="leaflet-control-attribution leaflet-control"><a href="https://leafletjs.com" title="A JavaScript library for interactive maps"><svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8" class="leaflet-attribution-flag"><path fill="#4C7BE1" d="M0 0h12v4H0z"></path><path fill="#FFD500" d="M0 4h12v3H0z"></path><path fill="#E0BC00" d="M0 7h12v1H0z"></path></svg> Leaflet</a></div></div></div></div>

        <div id="log" class="font-mono text-xs bg-black p-4 rounded h-48 overflow-y-auto border border-gray-700">
            <div class="text-gray-500 italic">Ready.</div>
        </div>
    </div>

    <script type="module">
        import { WebBleConnection, Constants } from 'https://cdn.jsdelivr.net/npm/@liamcottle/meshcore.js/+esm';

        // Suppress expected unhandled promise rejections from the BLE library on disconnect
        window.addEventListener('unhandledrejection', (event) => {
            if (event.reason && event.reason.name === 'NetworkError' && event.reason.message.includes('GATT Server is disconnected')) {
                event.preventDefault();
                console.log("Suppressed GATT disconnect error from library.");
            }
        });

        const logDiv = document.getElementById('log');
        const map = L.map('map').setView([-37.6937, 144.9652], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const heatPoints = [];
        const heatmap = L.heatLayer(heatPoints, { radius: 25, blur: 15 }).addTo(map);
        
        // Data storage for export and triangulation
        let packetCollection = []; 
        let connection = null;
        let currentPos = null;
        let isLoggingPaused = false;

        function appendLog(msg, color = 'text-gray-100') {
            const entry = document.createElement('div');
            const logDiv = document.getElementById('log');
            entry.className = color;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.prepend(entry);
        }

        // GPS Status DOM and Helper
        const gpsDot = document.getElementById('gpsDot');
        const gpsText = document.getElementById('gpsText');
        const gpsDetails = document.getElementById('gpsDetails');

        function updateGpsStatus(state, details = '') {
            gpsDot.className = 'w-2.5 h-2.5 rounded-full';
            switch (state) {
                case 'searching':
                    gpsDot.classList.add('bg-yellow-500', 'animate-pulse');
                    gpsText.textContent = 'Searching...';
                    gpsText.className = 'font-bold text-sm text-yellow-500';
                    gpsDetails.textContent = details || 'Waiting for fix';
                    gpsDetails.className = 'text-[10px] text-yellow-500/70 mt-1 text-center font-mono';
                    break;
                case 'locked':
                    gpsDot.classList.add('bg-green-500');
                    gpsText.textContent = 'Locked';
                    gpsText.className = 'font-bold text-sm text-green-500';
                    gpsDetails.textContent = details;
                    gpsDetails.className = 'text-[10px] text-green-500/70 mt-1 text-center font-mono';
                    break;
                case 'weak':
                    gpsDot.classList.add('bg-orange-500');
                    gpsText.textContent = 'Weak Lock';
                    gpsText.className = 'font-bold text-sm text-orange-500';
                    gpsDetails.textContent = details;
                    gpsDetails.className = 'text-[10px] text-orange-500/70 mt-1 text-center font-mono';
                    break;
                case 'blocked':
                    gpsDot.classList.add('bg-red-500');
                    gpsText.textContent = 'Blocked';
                    gpsText.className = 'font-bold text-sm text-red-500';
                    gpsDetails.textContent = details || 'Permission denied';
                    gpsDetails.className = 'text-[10px] text-red-500/70 mt-1 text-center font-mono';
                    break;
                default:
                    gpsDot.classList.add('bg-red-500');
                    gpsText.textContent = 'Error';
                    gpsText.className = 'font-bold text-sm text-red-500';
                    gpsDetails.textContent = details || 'GPS unavailable';
                    gpsDetails.className = 'text-[10px] text-red-500/70 mt-1 text-center font-mono';
            }
        }

        // Radio Status DOM and Helper
        const radioDot = document.getElementById('radioDot');
        const radioText = document.getElementById('radioText');
        const radioDetails = document.getElementById('radioDetails');

        function updateRadioStatus(state, details = '') {
            radioDot.className = 'w-2.5 h-2.5 rounded-full';
            switch (state) {
                case 'disconnected':
                    radioDot.classList.add('bg-red-500');
                    radioText.textContent = 'Disconnected';
                    radioText.className = 'font-bold text-sm text-red-500';
                    radioDetails.textContent = details || 'BLE Offline';
                    radioDetails.className = 'text-[10px] text-red-500/70 mt-1 text-center font-mono';
                    break;
                case 'connecting':
                    radioDot.classList.add('bg-yellow-500', 'animate-pulse');
                    radioText.textContent = 'Connecting...';
                    radioText.className = 'font-bold text-sm text-yellow-500';
                    radioDetails.textContent = details || 'Negotiating BLE';
                    radioDetails.className = 'text-[10px] text-yellow-500/70 mt-1 text-center font-mono';
                    break;
                case 'connected':
                    radioDot.classList.add('bg-green-500');
                    radioText.textContent = 'Connected';
                    radioText.className = 'font-bold text-sm text-green-500';
                    radioDetails.textContent = details || 'Rx Active';
                    radioDetails.className = 'text-[10px] text-green-500/70 mt-1 text-center font-mono';
                    break;
                case 'error':
                    radioDot.classList.add('bg-red-500', 'animate-pulse');
                    radioText.textContent = 'Error';
                    radioText.className = 'font-bold text-sm text-red-500';
                    radioDetails.textContent = details || 'Connection error';
                    radioDetails.className = 'text-[10px] text-red-500/70 mt-1 text-center font-mono';
                    break;
            }
        }

        // Breadcrumb Trail Polyline for search path tracking (indigo dashed line)
        const pathTrail = L.polyline([], {
            color: '#6366f1',
            weight: 3,
            dashArray: '5, 8',
            opacity: 0.8
        }).addTo(map);
        let lastPathPos = null;

        // Pause button handler
        const pauseBtn = document.getElementById('pauseBtn');
        pauseBtn.addEventListener('click', () => {
            if (isLoggingPaused) {
                // Check selection before starting/resuming logging
                const filterVal = document.getElementById('hashFilter').value.trim();
                if (!filterVal) {
                    alert("Please specify a Filter Hash (Channel Selection) before starting/resuming logging.");
                    document.getElementById('hashFilter').focus();
                    return;
                }
                isLoggingPaused = false;
                pauseBtn.textContent = "Pause Logging";
                pauseBtn.className = "bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-bold transition-colors text-sm";
                appendLog("Logging resumed.", "text-blue-400");
            } else {
                isLoggingPaused = true;
                pauseBtn.textContent = "Resume Logging";
                pauseBtn.className = "bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded font-bold transition-colors animate-pulse text-sm";
                appendLog("Logging paused.", "text-amber-400");
            }
        });

        // Initialize GPS watcher
        updateGpsStatus('searching');
        navigator.geolocation.watchPosition(pos => {
            currentPos = [pos.coords.latitude, pos.coords.longitude];
            const acc = Math.round(pos.coords.accuracy || 0);
            if (acc <= 15) {
                updateGpsStatus('locked', `Acc: ±${acc}m`);
            } else {
                updateGpsStatus('weak', `Acc: ±${acc}m`);
            }

            // Record track breadcrumb (search path) when connected and logging is active
            if (connection && !isLoggingPaused) {
                const hasMoved = !lastPathPos || (Math.abs(currentPos[0] - lastPathPos[0]) > 0.00004 || Math.abs(currentPos[1] - lastPathPos[1]) > 0.00004);
                if (hasMoved) {
                    pathTrail.addLatLng(currentPos);
                    packetCollection.push({
                        timestamp: new Date().toISOString(),
                        lat: currentPos[0],
                        lon: currentPos[1],
                        rssi: null,
                        hash: null,
                        type: 'breadcrumb'
                    });
                    lastPathPos = currentPos;
                }
            }
        }, err => {
            if (err.code === err.PERMISSION_DENIED) {
                updateGpsStatus('blocked', 'No location permission');
            } else {
                updateGpsStatus('error', err.message || 'Error getting GPS');
            }
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });

        // Function: Save data to file
        function downloadData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(packetCollection));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `mesh_data_${new Date().getTime()}.json`);
            dlAnchorElem.click();
        }

        // Function: Simple Weighted Centroid Triangulation
        function calculateCentroid() {
            let totalWeight = 0, latSum = 0, lonSum = 0;
            const signals = packetCollection.filter(p => p.type === 'signal' && p.lat !== undefined && p.rssi !== null);
            if (signals.length === 0) return null;
            signals.forEach(p => {
                let weight = Math.pow(10, (p.rssi + 100) / 10); 
                latSum += p.lat * weight;
                lonSum += p.lon * weight;
                totalWeight += weight;
            });
            return [latSum / totalWeight, lonSum / totalWeight];
        }

        async function disconnectRadio() {
            if (connection) {
                try {
                    if (typeof connection.disconnect === 'function') {
                        await connection.disconnect();
                    } else if (typeof connection.close === 'function') {
                        await connection.close();
                    }
                } catch (err) {
                    console.error("Disconnect error:", err);
                }
                connection = null;
            }
            updateRadioStatus('disconnected');
            document.getElementById('toggleBtn').textContent = "Connect BLE";
            
            // Reset Pause Button state
            isLoggingPaused = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = "Pause Logging";
            pauseBtn.className = "bg-gray-700 text-gray-500 px-4 py-2 rounded font-bold transition-colors cursor-not-allowed text-sm";
        }

        document.getElementById('toggleBtn').addEventListener('click', async () => {
            if (connection) {
                downloadData();
                const centroid = calculateCentroid();
                if (centroid) {
                    L.marker(centroid, { title: "Likely Source" }).addTo(map).bindPopup("Estimated Source Location").openPopup();
                }
                appendLog("Data saved & Source estimated!");
                await disconnectRadio();
                return;
            }

            try {
                updateRadioStatus('connecting');
                connection = await WebBleConnection.open();
                updateRadioStatus('connected');
                document.getElementById('toggleBtn').textContent = "Save & Disconnect";
                
                // Allow connection of BLE, but pause logging if no channel selection is made initially
                const filterVal = document.getElementById('hashFilter').value.trim();
                if (filterVal) {
                    isLoggingPaused = false;
                    pauseBtn.disabled = false;
                    pauseBtn.textContent = "Pause Logging";
                    pauseBtn.className = "bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-bold transition-colors text-sm";
                    appendLog("Logging started automatically.", "text-blue-400");
                } else {
                    isLoggingPaused = true;
                    pauseBtn.disabled = false;
                    pauseBtn.textContent = "Resume Logging";
                    pauseBtn.className = "bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded font-bold transition-colors animate-pulse text-sm";
                    appendLog("Connected. Enter a Filter Hash and click Resume Logging to start mapping.", "text-amber-400");
                }
                
                // Monitor disconnect if device provides it
                if (connection.device && typeof connection.device.addEventListener === 'function') {
                    connection.device.addEventListener('gattserverdisconnected', () => {
                        appendLog("BLE Disconnected by device", "text-red-400");
                        disconnectRadio();
                    });
                }
                
                connection.on(Constants.PushCodes.LogRxData, (event) => {
                    if (isLoggingPaused) return;

                    const data = event.raw;
                    if (!data || data.length < 9) return;

                    const hops = data[(data[0] & 0x03) === 0 ? 5 : 1] & 0x3F;
                    const hashIdx = ((data[0] & 0x03) === 0 ? 5 : 1) + 1 + (hops * ((data[(data[0] & 0x03) === 0 ? 5 : 1] >> 6) + 1));
                    const hash = "0X" + data[hashIdx].toString(16).toUpperCase();
                    
                    // Lock to 0 hops (direct messages only)
                    if (hops === 0) {
                        const selectedHash = document.getElementById('hashFilter').value.trim().toUpperCase();
                        
                        // Always log zero-hop messages received
                        appendLog(`Rx 0-hop: ${hash} @ ${event.lastRssi}dBm`);

                        if (selectedHash && hash === selectedHash) {
                            if (currentPos) {
                                packetCollection.push({
                                    timestamp: new Date().toISOString(),
                                    lat: currentPos[0],
                                    lon: currentPos[1],
                                    rssi: event.lastRssi,
                                    hash,
                                    type: 'signal'
                                });
                                L.circleMarker(currentPos, { color: 'cyan', radius: 4 }).addTo(map);
                                const intensity = Math.max(0, (event.lastRssi + 100) / 70);
                                heatPoints.push([...currentPos, intensity]);
                                heatmap.setLatLngs(heatPoints);
                            }
                        }
                    }
                });
            } catch (err) {
                appendLog("Error: " + err.message, "text-red-400");
                updateRadioStatus('error', err.message);
            }
        });
    </script>
